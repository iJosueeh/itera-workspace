name: Itera CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: itera-angular/package-lock.json

    - name: Install Dependencies
      run: |
        cd itera-angular
        npm ci

    - name: Check Formatting
      run: |
        cd itera-angular
        npx prettier --check "src/**/*.{ts,html,css}"

    - name: Run Tests
      run: |
        cd itera-angular
        npm test -- --watch=false

    - name: Build
      run: |
        cd itera-angular
        npm run build
