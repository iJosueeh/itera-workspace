version: '3.8'

services:

  # ==========================================
  # API Gateway - Traefik
  # ==========================================
  traefik:
    image: traefik:v2.10
    container_name: itera-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:${TRAEFIK_ENTRYPOINT_PORT:-80}"
    ports:
      - "${TRAEFIK_ENTRYPOINT_PORT:-80}:${TRAEFIK_ENTRYPOINT_PORT:-80}"
      - "${TRAEFIK_DASHBOARD_PORT:-8081}:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - itera-network

  # ==========================================
  # Frontend - Angular
  # ==========================================
  frontend:
    container_name: itera-frontend
    build:
      context: ./itera-angular
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=${ANGULAR_PORT:-4200}"
    environment:
      - API_URL=${API_GATEWAY_URL}
    depends_on:
      - backend-scala
    networks:
      - itera-network
    stdin_open: true
    tty: true

  # ==========================================
  # Backend Scala - Play Framework
  # ==========================================
  backend-scala:
    container_name: itera-backend-scala
    build:
      context: ./Itera
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-scala.rule=PathPrefix(`/api/core`) || PathPrefix(`/health`)"
      - "traefik.http.routers.backend-scala.entrypoints=web"
      - "traefik.http.services.backend-scala.loadbalancer.server.port=${SCALA_PORT:-8080}"
    ports:
      - "${SCALA_PORT:-8080}:8080"
    environment:
      # Play Framework
      - PLAY_SECRET_KEY=${PLAY_SECRET_KEY}

      # Neon PostgreSQL
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}

      # Integraciones
      - JWT_SECRET=${JWT_SECRET}
      - IA_API_URL=http://backend-python:8000
      - LOGICA_API_URL=http://prolog:9000
    depends_on:
      - backend-python
      - prolog
    networks:
      - itera-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SCALA_PORT:-8080}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==========================================
  # Backend Python - FastAPI + MongoDB
  # ==========================================
  backend-python:
    container_name: itera-backend-python
    build:
      context: ./Itera-python
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-python.rule=PathPrefix(`/api/ia`)"
      - "traefik.http.routers.backend-python.entrypoints=web"
      - "traefik.http.services.backend-python.loadbalancer.server.port=${PYTHON_PORT:-8000}"
      - "traefik.http.middlewares.ia-strip.stripprefix.prefixes=/api/ia"
      - "traefik.http.routers.backend-python.middlewares=ia-strip"
    environment:
      - PYTHON_ENV=${PYTHON_ENV:-development}

      # MongoDB Atlas
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE}

      # Integraciones
      - JWT_SECRET=${JWT_SECRET}
      - LOGICA_API_URL=http://prolog:9000
    networks:
      - itera-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PYTHON_PORT:-8000}/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Prolog
  # ==========================================
  prolog:
    container_name: itera-prolog
    build:
      context: ./itera-prolog
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prolog.rule=PathPrefix(`/api/logica`)"
      - "traefik.http.routers.prolog.entrypoints=web"
      - "traefik.http.services.prolog.loadbalancer.server.port=${PROLOG_PORT:-9000}"
      - "traefik.http.middlewares.logica-strip.stripprefix.prefixes=/api/logica"
      - "traefik.http.routers.prolog.middlewares=logica-strip"
    networks:
      - itera-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PROLOG_PORT:-9000}/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  itera-network:
    driver: bridge

volumes:
  scala-build:
  python-cache:
  prolog-data: