version: '3.8'

services:

  # ==========================================
  # API Gateway - Traefik
  # ==========================================
  traefik:
    image: traefik:v2.11
    container_name: itera-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=tcp://host.docker.internal:2375"
      - "--entrypoints.web.address=:${TRAEFIK_ENTRYPOINT_PORT:-80}"
      - "--log.level=DEBUG"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${TRAEFIK_ENTRYPOINT_PORT:-80}:${TRAEFIK_ENTRYPOINT_PORT:-80}"
      - "${TRAEFIK_DASHBOARD_PORT:-8081}:8080"
    networks:
      - itera-network

  # ==========================================
  # Frontend - Angular
  # ==========================================
  frontend:
    container_name: itera-frontend
    build:
      context: ./itera-angular
      dockerfile: Dockerfile
    ports:
      - "${ANGULAR_PORT:-4200}:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    environment:
      - API_URL=${API_GATEWAY_URL}
    depends_on:
      - backend-scala
    networks:
      - itera-network
    stdin_open: true
    tty: true

  # ==========================================
  # Backend Scala - Play Framework
  # ==========================================
  backend-scala:
    container_name: itera-backend-scala
    build:
      context: ./Itera
      dockerfile: Dockerfile
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-scala.rule=PathPrefix(`/api/core`) || PathPrefix(`/health`)"
      - "traefik.http.routers.backend-scala.entrypoints=web"
      - "traefik.http.services.backend-scala.loadbalancer.server.port=${SCALA_PORT:-8080}"
    ports:
      - "${SCALA_PORT:-8080}:8080"
    depends_on:
      - backend-python
      - prolog
    networks:
      - itera-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SCALA_PORT:-8080}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==========================================
  # Backend Python - FastAPI + MongoDB
  # ==========================================
  backend-python:
    container_name: itera-backend-python
    build:
      context: ./Itera-python
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-python.rule=PathPrefix(`/api/ia`)"
      - "traefik.http.routers.backend-python.entrypoints=web"
      - "traefik.http.services.backend-python.loadbalancer.server.port=${PYTHON_PORT:-8000}"
      - "traefik.http.middlewares.ia-strip.stripprefix.prefixes=/api/ia"
      - "traefik.http.routers.backend-python.middlewares=ia-strip"
    networks:
      - itera-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==========================================
  # Prolog
  # ==========================================
  prolog:
    container_name: itera-prolog
    build:
      context: ./itera-prolog
      dockerfile: Dockerfile
    ports:
      - "${PROLOG_PORT:-9001}:${PROLOG_PORT:-9001}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prolog.rule=PathPrefix(`/api/logic`)"
      - "traefik.http.routers.prolog.entrypoints=web"
      - "traefik.http.services.prolog.loadbalancer.server.port=${PROLOG_PORT:-9001}"
      - "traefik.http.middlewares.logica-strip.stripprefix.prefixes=/api/logic"
      - "traefik.http.routers.prolog.middlewares=logica-strip"
    networks:
      - itera-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${PROLOG_PORT:-9001}/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  itera-network:
    driver: bridge

volumes:
  scala-build:
  python-cache:
  prolog-data: